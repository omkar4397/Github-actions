# ============================================================
# Azure DevOps Pipeline — Testsigma CI/CD Integration
# ------------------------------------------------------------
# SECRETS REQUIRED (set in ADO Pipeline → Variables, mark as secret):
#   TESTSIGMA_API_KEY   → Your Testsigma API key (Settings → API Keys)
#   TESTSIGMA_EXEC_ID   → Your Testsigma Test Plan Execution ID
#
# OPTIONAL SECRET:
#   TESTSIGMA_ENV_ID    → Environment ID (leave blank to use default)
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pool:
  vmImage: 'ubuntu-latest'

variables:
  TESTSIGMA_API_URL: 'https://app.testsigma.com/api/v1'
  POLL_INTERVAL_SECONDS: 30
  MAX_WAIT_MINUTES: 30

stages:

  # ── Stage 1: Build ─────────────────────────────────────────
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        displayName: 'Build Application'
        steps:
          - checkout: self

          - script: |
              echo "✅ Source checked out from GitHub"
              echo "Branch : $(Build.SourceBranchName)"
              echo "Commit : $(Build.SourceVersion)"
              # Replace with your actual build commands
              # e.g. npm install && npm run build
            displayName: 'Build Steps'

  # ── Stage 2: Testsigma Test Execution ──────────────────────
  - stage: Test
    displayName: 'Testsigma Test Execution'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: RunTestsigma
        displayName: 'Trigger & Monitor Testsigma Test Plan'
        timeoutInMinutes: 45
        steps:

          # Step 1 — Trigger the test plan and capture Run ID
          - bash: |
              echo "🚀 Triggering Testsigma Execution ID: $(TESTSIGMA_EXEC_ID)"

              # Build request body — include environmentId only if provided
              if [ -n "$(TESTSIGMA_ENV_ID)" ]; then
                BODY="{\"executionId\": \"$(TESTSIGMA_EXEC_ID)\", \"environmentId\": \"$(TESTSIGMA_ENV_ID)\"}"
              else
                BODY="{\"executionId\": \"$(TESTSIGMA_EXEC_ID)\"}"
              fi

              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "$(TESTSIGMA_API_URL)/execution_results" \
                -H "Content-type: application/json" \
                -H "Accept: application/json" \
                -H "Authorization: Bearer $(TESTSIGMA_API_KEY)" \
                -d "$BODY")

              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY_RESP=$(echo "$RESPONSE" | head -n -1)

              echo "HTTP Status: $HTTP_CODE"

              if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                echo "❌ Failed to trigger test plan. HTTP $HTTP_CODE"
                echo "Response: $BODY_RESP"
                exit 1
              fi

              RUN_ID=$(echo "$BODY_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

              if [ -z "$RUN_ID" ]; then
                echo "❌ Could not extract Run ID from response."
                echo "Response: $BODY_RESP"
                exit 1
              fi

              echo "✅ Test run triggered successfully. Run ID: $RUN_ID"
              echo "##vso[task.setvariable variable=RUN_ID]$RUN_ID"
            displayName: 'Trigger Test Plan'
            env:
              TESTSIGMA_API_KEY: $(TESTSIGMA_API_KEY)
              TESTSIGMA_EXEC_ID: $(TESTSIGMA_EXEC_ID)
              TESTSIGMA_ENV_ID: $(TESTSIGMA_ENV_ID)

          # Step 2 — Poll execution_results until done or timeout
          - bash: |
              echo "⏳ Polling for test results (Run ID: $RUN_ID)"
              echo "   Interval: $(POLL_INTERVAL_SECONDS)s | Timeout: $(MAX_WAIT_MINUTES) mins"

              MAX_ITERATIONS=$(( $(MAX_WAIT_MINUTES) * 60 / $(POLL_INTERVAL_SECONDS) ))
              ITERATION=0

              while [ $ITERATION -lt $MAX_ITERATIONS ]; do
                ITERATION=$((ITERATION + 1))

                RESPONSE=$(curl -s -X GET \
                  "$(TESTSIGMA_API_URL)/execution_results/$RUN_ID" \
                  -H "Content-type: application/json" \
                  -H "Accept: application/json" \
                  -H "Authorization: Bearer $(TESTSIGMA_API_KEY)")

                STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))")
                RESULT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('result','N/A'))")

                echo "[Poll $ITERATION/$MAX_ITERATIONS] Status: $STATUS | Result: $RESULT"

                case "$STATUS" in
                  "SUCCESS")
                    echo "✅ Tests PASSED!"
                    exit 0
                    ;;
                  "FAILURE")
                    echo "❌ Tests FAILED!"
                    exit 1
                    ;;
                  "STOPPED"|"ABORT")
                    echo "⚠️  Test run was stopped or aborted."
                    exit 1
                    ;;
                  "RUNNING"|"QUEUED"|"PRE_FLIGHT")
                    sleep $(POLL_INTERVAL_SECONDS)
                    ;;
                  *)
                    echo "⚠️  Unknown status: '$STATUS'. Continuing to poll..."
                    sleep $(POLL_INTERVAL_SECONDS)
                    ;;
                esac
              done

              echo "❌ Timed out after $(MAX_WAIT_MINUTES) minutes."
              exit 1
            displayName: 'Poll Test Results'
            env:
              TESTSIGMA_API_KEY: $(TESTSIGMA_API_KEY)
              RUN_ID: $(RUN_ID)
